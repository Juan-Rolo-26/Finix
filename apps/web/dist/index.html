<!doctype html>
<html lang="es" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />

  <!-- Preconnect para recursos críticos (Fuentes externas) haciéndola ultra rápida -->
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link rel="dns-prefetch" href="https://api.fontshare.com" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finix - Finanzas Sociales</title>
  <script>
    (() => {
      const brands = navigator.userAgentData?.brands?.map(({ brand }) => brand) ?? [];
      const hasChromeBrand = brands.includes('Google Chrome');
      const userAgent = navigator.userAgent ?? '';
      const looksLikeChrome = /\bChrome\/\d+/i.test(userAgent);
      const isExcludedBrowser = /\bEdg\/|\bOPR\/|\bOpera\/|\bYaBrowser\/|\bSamsungBrowser\//i.test(userAgent);

      if (hasChromeBrand || (looksLikeChrome && !isExcludedBrowser)) {
        document.documentElement.classList.add('finix-chrome-desktop-zoom');
      }
    })();
  </script>

  <script type="module" crossorigin src="/assets/index-DicMRBR8.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DanE02rx.css">
</head>
